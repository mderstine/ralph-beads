name: Beads Triage

on:
  issues:
    types: [labeled]
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Preview triage without making changes"
        type: boolean
        default: false

# Prevent concurrent runs (triage commits back to repo)
concurrency:
  group: beads-triage
  cancel-in-progress: false

permissions:
  contents: write
  issues: write

jobs:
  triage:
    runs-on: ubuntu-latest
    if: >-
      github.repository == 'mderstine/ralph-beads'
      && (github.event_name == 'workflow_dispatch'
          || github.event.label.name == 'spec-candidate')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Beads
        uses: ./.github/actions/setup-beads

      - name: Triage spec-candidate issues
        shell: bash
        run: |
          args=()
          if [[ "${{ inputs.dry_run }}" == "true" ]]; then
            args+=(--dry-run)
          fi
          scripts/gh-triage.sh "${args[@]}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit new spec files
        if: inputs.dry_run != 'true'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add specs/
          if git diff --cached --quiet; then
            echo "No new spec files to commit."
          else
            git commit -m "docs: triage spec-candidate issues into specs/

          Generated by beads-triage workflow."
            git push
          fi
