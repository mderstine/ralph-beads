name: Beads Changelog

on:
  release:
    types: [created]
  workflow_dispatch:
    inputs:
      since:
        description: "Generate changelog since date (YYYY-MM-DD). Defaults to previous release date."
        required: false
      dry_run:
        description: "Preview changelog without committing or uploading"
        type: boolean
        default: false

# Prevent concurrent runs
concurrency:
  group: beads-changelog
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  changelog:
    runs-on: ubuntu-latest
    if: github.repository == 'mderstine/ralph-beads'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for commit SHA lookups

      - name: Setup Beads
        uses: ./.github/actions/setup-beads

      - name: Determine --since date
        id: since
        shell: bash
        run: |
          if [[ -n "${{ inputs.since }}" ]]; then
            echo "date=${{ inputs.since }}" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.event_name }}" == "release" ]]; then
            # Find the previous release date
            prev=$(gh release list --limit 2 --json tagName,publishedAt \
              --jq '.[1].publishedAt // empty' 2>/dev/null || true)
            if [[ -n "$prev" ]]; then
              echo "date=${prev%%T*}" >> "$GITHUB_OUTPUT"
            else
              echo "date=" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "date=" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate changelog
        id: generate
        shell: bash
        run: |
          args=()
          if [[ -n "${{ steps.since.outputs.date }}" ]]; then
            args+=(--since "${{ steps.since.outputs.date }}")
          fi
          args+=(--output CHANGELOG.md)

          if [[ "${{ inputs.dry_run }}" == "true" ]]; then
            args+=(--dry-run)
          fi

          scripts/gh-changelog.sh "${args[@]}"

      - name: Upload changelog as release asset
        if: github.event_name == 'release' && inputs.dry_run != 'true'
        shell: bash
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            CHANGELOG.md --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit changelog
        if: inputs.dry_run != 'true'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          if git diff --cached --quiet; then
            echo "No changelog changes to commit."
          else
            git commit -m "docs: update CHANGELOG.md

            Generated by beads-changelog workflow."
            git push
          fi
